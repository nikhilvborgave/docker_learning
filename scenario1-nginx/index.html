<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Nikhil's Docker App</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <div class="badge">🐳 Running inside Docker</div>
    <h1>Hey, I'm Nikhil!</h1>
    <p>This page is being served by <strong>Nginx</strong> inside a Docker container.</p>
    <div class="cards">
      <div class="card">
        <div class="icon">📦</div>
        <div class="label">Container</div>
        <div class="value">nginx:alpine</div>
      </div>
      <div class="card">
        <div class="icon">🌐</div>
        <div class="label">Port</div>
        <div class="value">80</div>
      </div>
      <div class="card">
        <div class="icon">✅</div>
        <div class="label">Status</div>
        <div class="value">Live</div>
      </div>
    </div>
    <div class="footer">Built with ❤️ while learning Docker</div>
  </div>
</body>
</html>
